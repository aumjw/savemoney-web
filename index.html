<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">
      <div class="text">
        <h3>Welcome</h3>
        <p>ขอต้อนรับสู่เว็บในการบันทุกรายรับรายจ่ายของคุณ</p>
      </div>
      <div class="box">
        <div class="inform">
          <p>เข้าสู่ระบบ📲</p>
          <input
            type="text"
            id="usname"
            name="username"
            placeholder="username"
          />
          <input
            type="password"
            id="password"
            name="password"
            placeholder="password"
          />
          <!-- ย้ายมาไว้ใน inform -->
          <a href="#" onclick="login()">ลงชื่อเข้าใช้</a>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
